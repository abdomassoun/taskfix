name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
      - name: Get last tag
        id: lasttag
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            last_tag=$(git describe --tags --abbrev=0)
            echo "has_tag=true" >> $GITHUB_OUTPUT
          else
            last_tag=""
            echo "has_tag=false" >> $GITHUB_OUTPUT
          fi
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          set -euo pipefail

          if [ "${{ steps.lasttag.outputs.has_tag }}" = "true" ]; then
            commits=$(git log ${{ steps.lasttag.outputs.last_tag }}..HEAD --pretty=format:"%s")
          else
            commits=$(git log --pretty=format:"%s")
          fi

          bump="patch"

          if echo "$commits" | grep -q "BREAKING CHANGE"; then
            bump="major"
          elif echo "$commits" | grep -qE "feat!:"; then
            bump="major"
          elif echo "$commits" | grep -qE "^feat:"; then
            bump="minor"
          fi

          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: ver
        run: |
          set -euo pipefail

          if [ "${{ steps.lasttag.outputs.has_tag }}" = "true" ]; then
            sem=${{ steps.lasttag.outputs.last_tag }}
            sem=${sem#v}
          else
            sem="0.0.0"
          fi

          IFS=. read -r major minor patch <<< "$sem"

          case "${{ steps.bump.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        run: |
          if git rev-parse "${{ steps.ver.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists. Skipping release."
            exit 1
          fi

      - name: Generate changelog
        run: |
          if [ "${{ steps.lasttag.outputs.has_tag }}" = "true" ]; then
            git log ${{ steps.lasttag.outputs.last_tag }}..HEAD --pretty=format:"- %s" > CHANGELOG.md
          else
            git log --pretty=format:"- %s" > CHANGELOG.md
          fi

      - name: Create tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.ver.outputs.new_tag }}
          git push origin ${{ steps.ver.outputs.new_tag }}

      - name: Build binary
        run: |
          make build

      - name: Prepare deb package
        run: |
          set -euo pipefail

          version=${{ steps.ver.outputs.new_tag }}
          version=${version#v}

          mkdir -p taskfix-deb/usr/local/bin
          cp -f taskfix taskfix-deb/usr/local/bin/taskfix

          sed -i -e "s/^Version:.*$/Version: ${version}/" taskfix-deb/DEBIAN/control

          dpkg-deb --build taskfix-deb taskfix_${version}_amd64.deb

          cp taskfix_${version}_amd64.deb taskfix_latest_amd64.deb

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: taskfix-deb
          path: |
            taskfix_*_amd64.deb

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ver.outputs.new_tag }}
          name: TaskFix ${{ steps.ver.outputs.new_tag }}
          body_path: CHANGELOG.md
          files: |
            taskfix_[0-9]*_amd64.deb
            taskfix_latest_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}